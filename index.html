<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>羽球計分板</title>
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="scoreboard-container">
        <!-- Court 1 -->
        <div class="court" id="court-left" data-side="left">
            <div class="team-name" id="name-left" contenteditable="true" spellcheck="false">主場 Player</div>
            <div class="score-display">
                <div class="score" id="score-left">0</div>
                <div class="swipe-hint">↕ 滑動加減分</div>
            </div>
            <div class="sets-container">
                <div>勝局: <span class="sets" id="sets-left">0</span></div>
                <div class="set-controls">
                    <button class="icon-btn" onclick="updateSets('left', 1)">+</button>
                    <button class="icon-btn" onclick="updateSets('left', -1)">-</button>
                </div>
            </div>
            <div class="color-picker">
                <div class="color-item">
                    <button class="color-btn btn-blue" onclick="setCourtColor('left', 'bg-blue')" aria-label="藍色"></button>
                    <input type="text" class="team-input input-bg-blue" value="藍隊" oninput="updateGlobalTeamName('bg-blue', this.value)" spellcheck="false">
                </div>
                <div class="color-item">
                    <button class="color-btn btn-cyan" onclick="setCourtColor('left', 'bg-cyan')" aria-label="青色"></button>
                    <input type="text" class="team-input input-bg-cyan" value="青隊" oninput="updateGlobalTeamName('bg-cyan', this.value)" spellcheck="false">
                </div>
                <div class="color-item">
                    <button class="color-btn btn-black" onclick="setCourtColor('left', 'bg-black')" aria-label="黑色"></button>
                    <input type="text" class="team-input input-bg-black" value="黑隊" oninput="updateGlobalTeamName('bg-black', this.value)" spellcheck="false">
                </div>
                <div class="color-item">
                    <button class="color-btn btn-pink" onclick="setCourtColor('left', 'bg-pink')" aria-label="粉色"></button>
                    <input type="text" class="team-input input-bg-pink" value="粉隊" oninput="updateGlobalTeamName('bg-pink', this.value)" spellcheck="false">
                </div>
            </div>
        </div>

        <!-- Court 2 -->
        <div class="court" id="court-right" data-side="right">
            <div class="team-name" id="name-right" contenteditable="true" spellcheck="false">客場 Player</div>
            <div class="score-display">
                <div class="score" id="score-right">0</div>
                <div class="swipe-hint">↕ 滑動加減分</div>
            </div>
            <div class="sets-container">
                <div>勝局: <span class="sets" id="sets-right">0</span></div>
                <div class="set-controls">
                    <button class="icon-btn" onclick="updateSets('right', 1)">+</button>
                    <button class="icon-btn" onclick="updateSets('right', -1)">-</button>
                </div>
            </div>
            <div class="color-picker">
                <div class="color-item">
                    <button class="color-btn btn-blue" onclick="setCourtColor('right', 'bg-blue')" aria-label="藍色"></button>
                    <input type="text" class="team-input input-bg-blue" value="藍隊" oninput="updateGlobalTeamName('bg-blue', this.value)" spellcheck="false">
                </div>
                <div class="color-item">
                    <button class="color-btn btn-cyan" onclick="setCourtColor('right', 'bg-cyan')" aria-label="青色"></button>
                    <input type="text" class="team-input input-bg-cyan" value="青隊" oninput="updateGlobalTeamName('bg-cyan', this.value)" spellcheck="false">
                </div>
                <div class="color-item">
                    <button class="color-btn btn-black" onclick="setCourtColor('right', 'bg-black')" aria-label="黑色"></button>
                    <input type="text" class="team-input input-bg-black" value="黑隊" oninput="updateGlobalTeamName('bg-black', this.value)" spellcheck="false">
                </div>
                <div class="color-item">
                    <button class="color-btn btn-pink" onclick="setCourtColor('right', 'bg-pink')" aria-label="粉色"></button>
                    <input type="text" class="team-input input-bg-pink" value="粉隊" oninput="updateGlobalTeamName('bg-pink', this.value)" spellcheck="false">
                </div>
            </div>
        </div>

        <!-- Center Controls -->
        <div class="controls-overlay">
            <button class="action-btn swap-btn" id="btn-swap">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3L4 7l4 4"></path>
                    <path d="M4 7h16"></path>
                    <path d="M16 21l4-4-4-4"></path>
                    <path d="M20 17H4"></path>
                </svg>
                交換場地
            </button>
            <button class="action-btn reset-btn" id="btn-reset">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    <path d="M3 3v5h5"></path>
                </svg>
                重置分數
            </button>
        </div>

        <!-- Footer Title -->
        <div class="footer-title">嘰嘰喳喳羽球團</div>
    </div>
    <script src="app.js"></script>
</body>

</html>
